<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Подключить тариф</title>

  <!-- Официальная библиотека Telegram Mini App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --tg-bg:        var(--tg-theme-bg-color,        #ffffff);
      --tg-text:      var(--tg-theme-text-color,       #000000);
      --tg-hint:      var(--tg-theme-hint-color,       #999999);
      --tg-secondary: var(--tg-theme-secondary-bg-color, #f1f1f1);
      --bee-yellow:      #FFD600;
      --bee-black:       #1A1A1A;
      --bee-yellow-glow: rgba(255, 214, 0, 0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background-color: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 24px;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      border-radius: 28px;
      background: var(--bee-yellow);
      box-shadow: 0 8px 32px var(--bee-yellow-glow);
      margin-bottom: 28px;
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .logo-wrap svg { width: 56px; height: 56px; }

    /* ── Text ── */
    .headline {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      color: var(--tg-text);
      margin-bottom: 10px;
      animation: fade-up 0.5s 0.1s ease both;
    }
    .sub {
      font-size: 15px;
      color: var(--tg-hint);
      text-align: center;
      line-height: 1.5;
      max-width: 280px;
      margin-bottom: 40px;
      animation: fade-up 0.5s 0.2s ease both;
    }

    /* ── Tariff card ── */
    .card {
      width: 100%;
      max-width: 340px;
      background: var(--tg-secondary);
      border-radius: 20px;
      padding: 20px 22px;
      margin-bottom: 24px;
      animation: fade-up 0.5s 0.3s ease both;
    }
    .card-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 14px;
    }
    .price {
      font-size: 36px;
      font-weight: 800;
      color: var(--tg-text);
      letter-spacing: -1px;
    }
    .price-unit {
      font-size: 15px;
      color: var(--tg-hint);
      font-weight: 500;
    }
    .features { display: flex; flex-direction: column; gap: 8px; }
    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--tg-text);
    }
    .feature-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--bee-yellow);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--bee-yellow-glow);
    }

    /* ── CTA Button ── */
    .cta-btn {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      padding: 18px 24px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: var(--bee-yellow);
      color: var(--bee-black);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 24px var(--bee-yellow-glow), 0 1px 0 rgba(255,255,255,0.25) inset;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease, opacity 0.2s ease;
      animation: fade-up 0.5s 0.4s ease both;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .cta-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px var(--bee-yellow-glow);
      filter: brightness(0.95);
    }
    .cta-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .cta-btn::after {
      content: '';
      position: absolute;
      border-radius: inherit;
      width: 100%; height: 100%;
      top: 0; left: 0;
      background: rgba(255,255,255,0.25);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .cta-btn:active::after { opacity: 1; transition: opacity 0s; }

    /* spinner */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(26,26,26,0.25);
      border-top-color: var(--bee-black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .cta-btn.loading .spinner  { display: block; }
    .cta-btn.loading .btn-icon { display: none; }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--tg-hint);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      animation: fade-up 0.5s 0.5s ease both;
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="screen">

  <div class="logo-wrap" aria-hidden="true">
    <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="28" fill="#1A1A1A"/>
      <path d="M14 20 Q28 14 42 20" stroke="#FFD600" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M11 28 Q28 20 45 28" stroke="#FFD600" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M14 36 Q28 42 42 36" stroke="#FFD600" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <h1 class="headline">Тариф Билайн</h1>
  <p class="sub">Выгодное предложение специально для вас — подключите прямо сейчас</p>

  <div class="card">
    <div class="card-row">
      <span class="price">300–350 ₽</span>
      <span class="price-unit">/ мес</span>
    </div>
    <div class="features">
      <div class="feature"><span class="feature-dot"></span>Безлимитный интернет</div>
      <div class="feature"><span class="feature-dot"></span>500–1000 минут на все номера</div>
      <div class="feature"><span class="feature-dot"></span>Роуминг по России</div>
    </div>
  </div>

  <button class="cta-btn" id="connectBtn" onclick="connectTariff()">
    <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
    <div class="spinner"></div>
    <span id="btnText">Подключить тариф</span>
  </button>

  <p class="note">Нажимая кнопку, вы перейдёте на официальный сайт Билайн для оформления</p>

</div>

<script>
  // ── Ссылка назначения ────────────────────────────────────────
  const BEELINE_URL = 'https://beeline.ru/customers/products/mobile/tariffs/details/eksklyuzivnii-plus/';

  // ── Инициализация SDK ────────────────────────────────────────
  // Безопасная проверка: SDK может не загрузиться при VPN/proxy
  const tg = (window.Telegram && window.Telegram.WebApp) || null;
  if (tg) {
    tg.ready();   // сообщаем Telegram, что интерфейс отрисован
    tg.expand();  // раскрываем на весь экран
  }

  // ── Многоуровневое открытие ссылки ───────────────────────────
  //
  //  Уровень 1 — tg.openLink()
  //    Официальный метод SDK. Telegram передаёт URL нативному
  //    обработчику системы (открывает браузер по умолчанию).
  //    Работает надёжнее всего, когда SDK загружен.
  //
  //  Уровень 2 — невидимый <a target="_blank"> + .click()
  //    Браузер считает клик «доверенным» (trusted event), поэтому
  //    не блокирует его как popup. Элемент вставляется в DOM,
  //    кликается синхронно, затем удаляется.
  //
  //  Уровень 3 — window.location.replace()
  //    Последний резерв. Перенаправляет текущую вкладку.
  //    replace() не засоряет историю браузера.
  //
  function openUrlSafely(url) {

    // Уровень 1
    if (tg && typeof tg.openLink === 'function') {
      try {
        tg.openLink(url);
        return;
      } catch (e) {
        console.warn('[L1] tg.openLink failed:', e);
      }
    }

    // Уровень 2
    try {
      const a = document.createElement('a');
      a.href        = url;
      a.target      = '_blank';
      a.rel         = 'noopener noreferrer';
      // Элемент обязан присутствовать в DOM — иначе Firefox игнорирует клик
      a.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { try { document.body.removeChild(a); } catch(_){} }, 500);
      return;
    } catch (e) {
      console.warn('[L2] anchor click failed:', e);
    }

    // Уровень 3
    try {
      window.location.replace(url);
    } catch (e) {
      console.warn('[L3] location.replace failed:', e);
    }
  }

  // ── Обработчик кнопки ────────────────────────────────────────
  function connectTariff() {
    const btn     = document.getElementById('connectBtn');
    const btnText = document.getElementById('btnText');

    // Визуальный отклик — переводим в состояние «загрузка»
    btn.disabled = true;
    btn.classList.add('loading');
    btnText.textContent = 'Открываем...';

    // Открываем ссылку (синхронно, внутри trusted event — важно!)
    openUrlSafely(BEELINE_URL);

    // Восстанавливаем кнопку через 3 с (пользователь мог вернуться)
    setTimeout(() => {
      btn.disabled = false;
      btn.classList.remove('loading');
      btnText.textContent = 'Подключить тариф';
    }, 3000);
  }
</script>

</body>
</html>
