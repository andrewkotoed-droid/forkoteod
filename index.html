<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Подключить тариф</title>

  <!-- Официальная библиотека Telegram Mini App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* ─── Telegram theme tokens ─── */
    :root {
      --tg-bg:        var(--tg-theme-bg-color,       #ffffff);
      --tg-text:      var(--tg-theme-text-color,      #000000);
      --tg-hint:      var(--tg-theme-hint-color,      #999999);
      --tg-link:      var(--tg-theme-link-color,      #2678b6);
      --tg-btn:       var(--tg-theme-button-color,    #2678b6);
      --tg-btn-text:  var(--tg-theme-button-text-color, #ffffff);
      --tg-secondary: var(--tg-theme-secondary-bg-color, #f1f1f1);

      /* Beeline brand */
      --bee-yellow: #FFD600;
      --bee-black:  #1A1A1A;
      --bee-yellow-glow: rgba(255, 214, 0, 0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background-color: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─── Layout ─── */
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 24px;
      gap: 0;
    }

    /* ─── Logo badge ─── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      border-radius: 28px;
      background: var(--bee-yellow);
      box-shadow: 0 8px 32px var(--bee-yellow-glow);
      margin-bottom: 28px;
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .logo-wrap svg {
      width: 56px;
      height: 56px;
    }

    /* ─── Headline ─── */
    .headline {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      color: var(--tg-text);
      margin-bottom: 10px;
      animation: fade-up 0.5s 0.1s ease both;
    }

    .sub {
      font-size: 15px;
      color: var(--tg-hint);
      text-align: center;
      line-height: 1.5;
      max-width: 280px;
      margin-bottom: 40px;
      animation: fade-up 0.5s 0.2s ease both;
    }

    /* ─── Tariff card ─── */
    .card {
      width: 100%;
      max-width: 340px;
      background: var(--tg-secondary);
      border-radius: 20px;
      padding: 20px 22px;
      margin-bottom: 24px;
      animation: fade-up 0.5s 0.3s ease both;
    }

    .card-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 14px;
    }

    .price {
      font-size: 36px;
      font-weight: 800;
      color: var(--tg-text);
      letter-spacing: -1px;
    }

    .price-unit {
      font-size: 15px;
      color: var(--tg-hint);
      font-weight: 500;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--tg-text);
    }

    .feature-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--bee-yellow);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--bee-yellow-glow);
    }

    /* ─── CTA Button (Beeline colors) ─── */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      padding: 18px 24px;
      border-radius: 16px;
      border: none;
      cursor: pointer;

      background: var(--bee-yellow);
      color: var(--bee-black);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.2px;

      box-shadow:
        0 4px 24px var(--bee-yellow-glow),
        0 1px 0 rgba(255,255,255,0.25) inset;

      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      animation: fade-up 0.5s 0.4s ease both;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .cta-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px var(--bee-yellow-glow);
      filter: brightness(0.95);
    }

    .cta-btn svg {
      flex-shrink: 0;
    }

    .cta-btn .btn-arrow {
      margin-left: auto;
      opacity: 0.6;
    }

    /* ─── Footer note ─── */
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--tg-hint);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      animation: fade-up 0.5s 0.5s ease both;
    }

    /* ─── Animations ─── */
    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Ripple on tap */
    .cta-btn::after {
      content: '';
      position: absolute;
      border-radius: inherit;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      background: rgba(255,255,255,0.25);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .cta-btn { position: relative; overflow: hidden; }
    .cta-btn:active::after { opacity: 1; transition: opacity 0s; }
  </style>
</head>
<body>

<div class="screen">

  <!-- Логотип Билайн -->
  <div class="logo-wrap" aria-hidden="true">
    <!-- Упрощённый логотип Билайн (полосатый круг) -->
    <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="28" fill="#1A1A1A"/>
      <path d="M14 20 Q28 14 42 20" stroke="#FFD600" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M11 28 Q28 20 45 28" stroke="#FFD600" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M14 36 Q28 42 42 36" stroke="#FFD600" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <h1 class="headline">Тариф Билайн</h1>
  <p class="sub">Выгодное предложение специально для вас — подключите прямо сейчас</p>

  <!-- Карточка с деталями тарифа -->
  <div class="card">
    <div class="card-row">
      <span class="price">300–350 ₽</span>
      <span class="price-unit">/ мес</span>
    </div>
    <div class="features">
      <div class="feature"><span class="feature-dot"></span>Безлимитный интернет</div>
      <div class="feature"><span class="feature-dot"></span>500–1000 минут на все номера</div>
      <div class="feature"><span class="feature-dot"></span>Роуминг по России</div>
    </div>
  </div>

  <!-- ────────────────────────────────────────────────────────────────
       ВСТАВЬТЕ ВАШУ ССЫЛКУ НИЖЕ в параметр openLink('...')
       ──────────────────────────────────────────────────────────────── -->
  <button class="cta-btn" onclick="connectTariff()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
    Подключить тариф
  </button>

  <p class="note">Нажимая кнопку, вы перейдёте на официальный сайт Билайн для оформления</p>

</div>

        <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function openExternal() {
            const url = 'ВАША_ССЫЛКА_БИЛАЙН'; 
            
            // Способ 1: Официальный метод Telegram (самый надежный)
            tg.openLink(url);

            // Способ 2: Запасной (если SDK не успел прогрузиться через VPN)
            setTimeout(() => {
                window.open(url, '_blank');
            }, 100);

            // Способ 3: "Грубый" переход (если все остальное заблокировано)
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }
    </script>


</body>
</html>
